<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect all 404s back to index.html preserving the path
      var path = window.location.pathname + window.location.search + window.location.hash
      sessionStorage.setItem('spa_redirect', path)
      window.location.replace('/')
    </script>
  </head>
  <body></body>
</html>
